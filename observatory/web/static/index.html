<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>HIDE Observatory</title>
<meta name="viewport" content="width=1440"/>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500;600&family=IBM+Plex+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
  :root{
    --bg:#0D1117;
    --surface:#161B22;
    --surface-2:#1C232C;
    --border:#30363D;
    --border-soft:#232a33;
    --accent:#2F81F7;
    --accent-soft:rgba(47,129,247,.14);
    --green:#3FB950;
    --amber:#D29922;
    --red:#F85149;
    --text:#E6EDF3;
    --muted:#8B949E;
    --muted-2:#636d78;
    --mono:'IBM Plex Mono', ui-monospace, monospace;
    --sans:'IBM Plex Sans', ui-sans-serif, system-ui, sans-serif;
    --row: 40px;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0;background:var(--bg);color:var(--text);font-family:var(--sans);
    font-size:13px;line-height:1.45;-webkit-font-smoothing:antialiased}
  a{color:inherit;text-decoration:none}
  button{font-family:inherit;color:inherit}

  /* ---------- Layout shell ---------- */
  .app{display:grid;grid-template-columns:232px 1fr;min-height:100vh}
  .sidebar{border-right:1px solid var(--border);background:#0b1015;position:sticky;top:0;
    height:100vh;display:flex;flex-direction:column;min-width:0}
  .main{min-width:0;display:flex;flex-direction:column}
  .topbar{display:flex;align-items:center;justify-content:space-between;
    padding:0 24px;height:56px;border-bottom:1px solid var(--border);
    background:rgba(13,17,23,.88);backdrop-filter:blur(8px);position:sticky;top:0;z-index:10}
  .content{padding:24px;flex:1;min-height:0}

  /* ---------- Sidebar ---------- */
  .brand{display:flex;align-items:center;gap:10px;padding:16px 18px 14px;
    border-bottom:1px solid var(--border)}
  .brand-mark{width:28px;height:28px;position:relative;flex:none}
  .brand-name{font-weight:600;letter-spacing:.02em;font-size:14px}
  .brand-sub{color:var(--muted);font-size:10px;letter-spacing:.14em;text-transform:uppercase;
    font-family:var(--mono);margin-top:1px}
  .nav{padding:10px 10px;display:flex;flex-direction:column;gap:2px;flex:1;overflow:auto}
  .nav-section{color:var(--muted-2);font-family:var(--mono);font-size:10px;letter-spacing:.14em;
    text-transform:uppercase;padding:14px 10px 6px}
  .nav-item{display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:6px;
    color:var(--muted);cursor:default;border:1px solid transparent;font-size:13px}
  .nav-item .ico{width:16px;height:16px;opacity:.8;flex:none}
  .nav-item:hover{background:#131820;color:var(--text)}
  .nav-item.active{background:#131a26;color:var(--text);border-color:#1f2a3d;
    box-shadow:inset 2px 0 0 var(--accent)}
  .nav-item .kbd{margin-left:auto;font-family:var(--mono);font-size:10px;color:var(--muted-2);
    border:1px solid var(--border);border-radius:3px;padding:1px 5px}

  .sidebar-foot{border-top:1px solid var(--border);padding:12px;display:flex;flex-direction:column;gap:10px}
  .run-btn{display:flex;align-items:center;justify-content:center;gap:8px;
    background:var(--accent);color:#fff;border:0;border-radius:6px;padding:9px 12px;
    font-weight:600;font-size:13px;cursor:default;
    box-shadow:0 0 0 1px rgba(47,129,247,.3), 0 6px 18px -8px rgba(47,129,247,.6)}
  .run-btn:hover{filter:brightness(1.08)}
  .run-btn.running{background:#1f2a3d;color:var(--muted);box-shadow:none}
  .sync{font-family:var(--mono);font-size:10px;color:var(--muted-2);text-align:center;
    letter-spacing:.04em}
  .sync b{color:var(--muted);font-weight:500}
  .sync .dot{display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--green);
    box-shadow:0 0 8px var(--green);margin-right:6px;vertical-align:middle;
    animation:pulse 2.2s ease-in-out infinite}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}

  /* ---------- Topbar ---------- */
  .crumbs{display:flex;align-items:center;gap:10px;font-family:var(--mono);font-size:11px;
    color:var(--muted);letter-spacing:.04em}
  .crumbs .sep{color:var(--muted-2)}
  .crumbs .cur{color:var(--text)}
  .top-right{display:flex;align-items:center;gap:14px;font-family:var(--mono);font-size:11px;
    color:var(--muted)}
  .stat-pill{display:inline-flex;align-items:center;gap:6px;padding:4px 8px;
    border:1px solid var(--border);border-radius:999px;background:var(--surface)}
  .stat-pill .d{width:6px;height:6px;border-radius:50%;background:var(--green);
    box-shadow:0 0 6px var(--green);animation:pulse 2.2s ease-in-out infinite}
  .stat-pill.warn .d{background:var(--amber);box-shadow:0 0 6px var(--amber)}
  .ticker{font-variant-numeric:tabular-nums}
  .avatar{width:26px;height:26px;border-radius:50%;background:linear-gradient(135deg,#2F81F7,#8957E5);
    display:grid;place-items:center;color:#fff;font-size:11px;font-weight:600;font-family:var(--mono)}

  /* ---------- Page header ---------- */
  .ph{display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:20px}
  .ph h1{margin:0;font-size:22px;font-weight:600;letter-spacing:-.01em}
  .ph .sub{color:var(--muted);font-size:12px;margin-top:4px;font-family:var(--mono);
    letter-spacing:.02em}
  .ph-actions{display:flex;gap:8px}
  .btn{display:inline-flex;align-items:center;gap:6px;background:var(--surface);
    border:1px solid var(--border);color:var(--text);border-radius:6px;padding:6px 10px;
    font-size:12px;cursor:default;font-family:var(--sans)}
  .btn:hover{border-color:#485262;background:#1b232d}
  .btn.primary{background:var(--accent);border-color:var(--accent);color:#fff}
  .btn.primary:hover{filter:brightness(1.08)}
  .btn .k{font-family:var(--mono);font-size:10px;color:var(--muted);
    border:1px solid var(--border);border-radius:3px;padding:0 4px;margin-left:4px}

  /* ---------- Grid / cards ---------- */
  .grid{display:grid;gap:16px}
  .card{background:var(--surface);border:1px solid var(--border);border-radius:8px;
    padding:16px;position:relative;min-width:0}
  .card.pad-0{padding:0}
  .card h3{margin:0 0 10px;font-size:13px;font-weight:600;letter-spacing:.01em;
    display:flex;align-items:center;justify-content:space-between}
  .card h3 .meta{color:var(--muted);font-family:var(--mono);font-size:10px;
    letter-spacing:.06em;text-transform:uppercase;font-weight:500}

  /* KPI card */
  .kpi{padding:16px;display:flex;flex-direction:column;gap:6px;position:relative;overflow:hidden}
  .kpi .lbl{color:var(--muted);font-size:10px;letter-spacing:.12em;text-transform:uppercase;
    font-family:var(--mono);display:flex;align-items:center;gap:8px}
  .kpi .lbl .dot{width:5px;height:5px;border-radius:50%;background:var(--accent);
    box-shadow:0 0 6px var(--accent)}
  .kpi .val{font-family:var(--mono);font-size:30px;font-weight:500;letter-spacing:-.01em;
    line-height:1;margin-top:4px}
  .kpi .delta{font-family:var(--mono);font-size:11px;color:var(--green);
    display:flex;align-items:center;gap:4px}
  .kpi .delta.down{color:var(--red)}
  .kpi .delta.flat{color:var(--muted)}
  .kpi .spark{position:absolute;right:12px;top:14px;opacity:.8}
  .kpi .rail{position:absolute;left:0;top:0;bottom:0;width:2px;background:var(--accent);opacity:.8}
  .kpi.g .rail{background:var(--green)} .kpi.g .lbl .dot{background:var(--green);box-shadow:0 0 6px var(--green)}
  .kpi.a .rail{background:var(--amber)} .kpi.a .lbl .dot{background:var(--amber);box-shadow:0 0 6px var(--amber)}
  .kpi.r .rail{background:var(--red)}   .kpi.r .lbl .dot{background:var(--red);box-shadow:0 0 6px var(--red)}
  .kpi.p .rail{background:#8957E5}      .kpi.p .lbl .dot{background:#8957E5;box-shadow:0 0 6px #8957E5}

  /* Tables */
  table.t{width:100%;border-collapse:collapse;font-size:12px}
  table.t th,table.t td{text-align:left;padding:10px 12px;border-bottom:1px solid var(--border-soft)}
  table.t th{font-weight:500;color:var(--muted);font-family:var(--mono);font-size:10px;
    letter-spacing:.1em;text-transform:uppercase;background:#131820;
    border-bottom:1px solid var(--border);position:sticky;top:0}
  table.t td.num{font-family:var(--mono);text-align:right;font-variant-numeric:tabular-nums}
  table.t tr:hover td{background:#131820}
  table.t tr.sel td{background:#131a26}
  table.t td.name{font-weight:500}
  .tag{display:inline-block;padding:1px 7px;border-radius:3px;font-size:10px;font-family:var(--mono);
    letter-spacing:.04em;border:1px solid var(--border);color:var(--muted);background:#10151c}
  .tag.blue{color:#79b8ff;border-color:#1f3a62;background:rgba(47,129,247,.08)}
  .tag.green{color:#6fda7e;border-color:#1f4a2c;background:rgba(63,185,80,.1)}
  .tag.amber{color:#e3b341;border-color:#4a3a10;background:rgba(210,153,34,.1)}
  .tag.red{color:#ff7b72;border-color:#4a1d1d;background:rgba(248,81,73,.1)}
  .tag.purple{color:#b392f0;border-color:#3a2a55;background:rgba(137,87,229,.1)}

  /* Bars */
  .bar-chart{display:flex;gap:4px;align-items:flex-end;height:180px;padding:8px 0 0}
  .bar{flex:1;min-width:0;background:linear-gradient(180deg, #3a8eff 0%, #1d5dbf 100%);
    border-radius:2px 2px 0 0;position:relative;opacity:.92;transition:opacity .15s}
  .bar:hover{opacity:1;filter:brightness(1.2)}
  .bar .lbl{position:absolute;bottom:-18px;left:0;right:0;text-align:center;
    font-family:var(--mono);font-size:9px;color:var(--muted-2)}
  .bar .val{position:absolute;top:-16px;left:0;right:0;text-align:center;
    font-family:var(--mono);font-size:9px;color:var(--muted);opacity:0}
  .bar:hover .val{opacity:1}

  .hbar-row{display:grid;grid-template-columns:140px 1fr 48px;align-items:center;gap:10px;
    padding:6px 0;font-size:12px}
  .hbar-row .name{color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .hbar-row .v{color:var(--muted);font-family:var(--mono);text-align:right;font-size:11px}
  .hbar{height:8px;background:#0d1218;border-radius:2px;overflow:hidden;position:relative}
  .hbar span{display:block;height:100%;background:linear-gradient(90deg,var(--accent),var(--green));
    border-radius:2px}

  /* Filter row */
  .filters{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:16px}
  .field{display:flex;flex-direction:column;gap:4px}
  .field label{font-family:var(--mono);font-size:10px;letter-spacing:.08em;text-transform:uppercase;
    color:var(--muted)}
  .field select,.field input[type="text"]{background:var(--surface);border:1px solid var(--border);
    border-radius:6px;color:var(--text);padding:7px 9px;font-size:12px;font-family:var(--sans);
    appearance:none;
    background-image:linear-gradient(45deg,transparent 50%,var(--muted) 50%),linear-gradient(135deg,var(--muted) 50%,transparent 50%);
    background-position:calc(100% - 14px) 13px,calc(100% - 9px) 13px;background-size:5px 5px;
    background-repeat:no-repeat;padding-right:26px}
  .field input[type="text"]{background-image:none;padding-right:9px}
  .field .slider{display:flex;align-items:center;gap:10px;padding:6px 0}
  .field .slider input[type="range"]{flex:1;accent-color:var(--accent)}
  .field .slider .v{font-family:var(--mono);color:var(--muted);font-size:11px;
    min-width:24px;text-align:right}

  /* Legend */
  .legend{display:flex;flex-wrap:wrap;gap:12px;font-family:var(--mono);font-size:10px;color:var(--muted)}
  .legend .d{width:8px;height:8px;border-radius:2px;display:inline-block;margin-right:5px;
    vertical-align:middle}

  /* Pagination */
  .pager{display:flex;align-items:center;justify-content:space-between;padding:10px 12px;
    border-top:1px solid var(--border-soft);font-family:var(--mono);font-size:11px;color:var(--muted)}
  .pager .pg{display:flex;gap:4px}
  .pager .pg button{background:var(--surface);border:1px solid var(--border);color:var(--muted);
    border-radius:4px;width:26px;height:24px;font-family:var(--mono);font-size:11px;cursor:default}
  .pager .pg button.on{background:#131a26;color:var(--text);border-color:#1f2a3d}

  /* Cluster cards */
  .cluster-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:12px}
  .cluster-card{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:14px;
    position:relative;overflow:hidden}
  .cluster-card .c-name{font-weight:600;font-size:13px;display:flex;align-items:center;gap:8px}
  .cluster-card .c-size{color:var(--muted);font-family:var(--mono);font-size:11px;margin-top:2px}
  .cluster-card .c-sil{position:absolute;top:12px;right:12px;font-family:var(--mono);font-size:10px;
    padding:2px 6px;border-radius:3px;letter-spacing:.04em}
  .cluster-card .c-top{margin-top:10px;display:flex;flex-wrap:wrap;gap:4px}
  .cluster-card .c-swatch{width:10px;height:10px;border-radius:2px;flex:none}
  .sil-g{background:rgba(63,185,80,.15);color:#6fda7e;border:1px solid #1f4a2c}
  .sil-a{background:rgba(210,153,34,.15);color:#e3b341;border:1px solid #4a3a10}
  .sil-r{background:rgba(248,81,73,.15);color:#ff7b72;border:1px solid #4a1d1d}

  /* Agent grid */
  .agent-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
  .agent-card{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:14px;
    position:relative;display:flex;flex-direction:column;gap:8px;min-height:150px}
  .agent-card .top{display:flex;align-items:center;justify-content:space-between}
  .agent-card .nm{font-family:var(--mono);font-size:12px;font-weight:500;color:var(--text)}
  .agent-card .nm .pre{color:var(--muted-2)}
  .agent-card .bdg{font-family:var(--mono);font-size:9px;letter-spacing:.1em;padding:2px 6px;
    border-radius:3px;border:1px solid}
  .bdg.active{color:#6fda7e;border-color:#1f4a2c;background:rgba(63,185,80,.1)}
  .bdg.idle{color:var(--muted);border-color:var(--border);background:#10151c}
  .bdg.error{color:#ff7b72;border-color:#4a1d1d;background:rgba(248,81,73,.1)}
  .agent-card .st{display:flex;align-items:center;gap:8px}
  .agent-card .st .dot{width:7px;height:7px;border-radius:50%;background:var(--green);
    box-shadow:0 0 6px var(--green);animation:pulse 1.8s ease-in-out infinite}
  .agent-card.idle .st .dot{background:var(--muted);box-shadow:none;animation:none}
  .agent-card.err  .st .dot{background:var(--red);box-shadow:0 0 6px var(--red)}
  .agent-card .rows{margin-top:auto;display:grid;grid-template-columns:1fr 1fr;gap:4px 12px;
    font-size:11px}
  .agent-card .rows .k{color:var(--muted);font-family:var(--mono);font-size:10px;
    letter-spacing:.06em;text-transform:uppercase}
  .agent-card .rows .v{font-family:var(--mono)}
  .agent-card .mini{height:28px;display:flex;align-items:flex-end;gap:2px;margin-top:-4px}
  .agent-card .mini i{flex:1;background:var(--accent);border-radius:1px;opacity:.7}
  .agent-card.idle .mini i{background:var(--muted-2);opacity:.4}
  .agent-card.err  .mini i{background:var(--red);opacity:.7}

  /* Log */
  .log{background:#0a0e13;border:1px solid var(--border);border-radius:6px;padding:10px 12px;
    font-family:var(--mono);font-size:11px;line-height:1.7;height:300px;overflow:auto;color:var(--muted)}
  .log .ts{color:var(--muted-2);margin-right:8px}
  .log .lvl{display:inline-block;width:50px;font-weight:600}
  .log .lvl.INFO{color:#79b8ff}
  .log .lvl.WARN{color:#e3b341}
  .log .lvl.ERR{color:#ff7b72}
  .log .lvl.OK{color:#6fda7e}
  .log .a{color:#b392f0}

  /* Heatmap */
  .heatmap{display:grid;gap:2px}
  .heatmap .hm-row{display:grid;gap:2px;align-items:center}
  .heatmap .hm-row .lbl{font-family:var(--mono);font-size:10px;color:var(--muted);
    padding-right:8px;text-align:right;white-space:nowrap}
  .heatmap .hm-cell{height:22px;border-radius:2px;position:relative;cursor:default}
  .heatmap .hm-cell:hover::after{content:attr(data-v);position:absolute;top:-22px;left:50%;
    transform:translateX(-50%);background:#0a0e13;border:1px solid var(--border);
    padding:2px 6px;border-radius:3px;font-family:var(--mono);font-size:10px;color:var(--text);
    white-space:nowrap;z-index:5}
  .hm-col-labels{display:grid;gap:2px;margin-left:100px;margin-bottom:4px}
  .hm-col-labels span{font-family:var(--mono);font-size:10px;color:var(--muted);
    writing-mode:vertical-rl;transform:rotate(180deg);height:60px}

  /* Payoff */
  .payoff{display:grid;grid-template-columns:50px 1fr 1fr;grid-template-rows:30px 1fr 1fr;
    gap:2px;background:#0a0e13;padding:8px;border-radius:6px}
  .payoff .hd{font-family:var(--mono);font-size:10px;color:var(--muted);
    display:grid;place-items:center;padding:4px}
  .payoff .cell{background:#131820;border:1px solid var(--border);border-radius:4px;padding:10px;
    display:flex;flex-direction:column;gap:4px;position:relative}
  .payoff .cell.nash{border-color:var(--green);box-shadow:0 0 0 1px var(--green), 0 0 20px rgba(63,185,80,.25)}
  .payoff .cell .pr{font-family:var(--mono);font-size:10px;color:var(--muted);
    display:flex;justify-content:space-between}
  .payoff .cell .pv{font-family:var(--mono);font-size:16px;font-weight:500;
    display:flex;justify-content:space-between}
  .payoff .cell .pv span:first-child{color:#79b8ff}
  .payoff .cell .pv span:last-child{color:#f0b67f}
  .payoff .cell.nash .nash-mark{position:absolute;top:6px;right:6px;font-family:var(--mono);
    font-size:9px;color:var(--green);letter-spacing:.1em}

  /* Scatter plot (svg based) */
  .chart-wrap{position:relative;width:100%}
  .chart-wrap svg{width:100%;display:block}

  /* Profile panel */
  .profile{background:var(--surface-2);border:1px solid var(--border);border-radius:8px;padding:18px;
    display:flex;flex-direction:column;gap:14px;position:sticky;top:72px}
  .profile-hd{display:flex;align-items:center;gap:12px}
  .profile-hd .av{width:44px;height:44px;border-radius:50%;
    background:linear-gradient(135deg,#2F81F7,#8957E5);display:grid;place-items:center;
    color:#fff;font-family:var(--mono);font-size:16px;font-weight:500;flex:none}
  .profile-hd .nm{font-size:15px;font-weight:600}
  .profile-hd .mt{color:var(--muted);font-size:11px;font-family:var(--mono)}
  .profile-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:1px;background:var(--border);
    border-radius:6px;overflow:hidden}
  .profile-stats div{background:var(--surface-2);padding:10px 12px}
  .profile-stats .k{color:var(--muted);font-family:var(--mono);font-size:9px;letter-spacing:.12em;
    text-transform:uppercase}
  .profile-stats .v{font-family:var(--mono);font-size:18px;font-weight:500;margin-top:2px}
  .expertise-bar{display:flex;align-items:center;gap:10px;padding:6px 0;font-size:11px}
  .expertise-bar .nm{width:100px;color:var(--text)}
  .expertise-bar .bar2{flex:1;height:5px;background:#0d1218;border-radius:2px;overflow:hidden}
  .expertise-bar .bar2 span{display:block;height:100%;background:var(--accent)}
  .expertise-bar .sc{font-family:var(--mono);color:var(--muted);font-size:10px;width:32px;text-align:right}

  /* misc */
  .sep-v{width:1px;background:var(--border);align-self:stretch}
  .hr{height:1px;background:var(--border-soft);margin:10px 0}
  .grow{flex:1}
  .ellipsis{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

  /* Density tweak */
  body.compact .kpi{padding:12px}
  body.compact .kpi .val{font-size:24px}
  body.compact .card{padding:12px}
  body.compact table.t th, body.compact table.t td{padding:7px 10px}
  body.comfy .kpi{padding:20px}
  body.comfy .kpi .val{font-size:34px}
  body.comfy .card{padding:20px}

  /* Focus ring for selected row */
  .ring{box-shadow:0 0 0 1px var(--accent), 0 0 0 4px rgba(47,129,247,.18)}

  /* Terminal log blink */
  .cursor{display:inline-block;width:7px;height:13px;background:var(--accent);
    vertical-align:middle;animation:blink 1s steps(2) infinite;margin-left:2px}
  @keyframes blink{50%{opacity:0}}
</style>
</head>
